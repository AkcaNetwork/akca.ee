<link rel="icon" type="image/x-icon" href="assets/favicon.ico">
<link rel="icon" type="image/png" sizes="96x96" href="assets/favicon-96x96.png">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root {
  --bg: #0a0a0f;
  --surface: rgba(255,255,255,0.04);
  --surface-hover: rgba(255,255,255,0.08);
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.15);
  --text: #ffffff;
  --text-secondary: #a0aec0;
  --text-muted: #718096;
  --blue: #667eea;
  --purple: #764ba2;
  --pink: #f093fb;
  --radius: 18px;
  --blur: 24px;
}

html {
  background: var(--bg);
  color: var(--text);
  font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  align-items: center;
  justify-content: flex-start;
  position: relative;
  overflow-x: hidden;
}

/* ── Unicorn Studio BG ── */
.us-bg {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ── Main Container ── */
.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 440px;
  padding: 48px 40px 40px 60px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 28px;
}

/* ── Links List ── */
.links {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* ── Liquid Glass Link ── */
.link-card {
  display: flex;
  align-items: center;
  gap: 14px;
  width: 100%;
  padding: 16px 20px;
  border-radius: var(--radius);
  background: linear-gradient(135deg, rgba(10,10,20,0.75), rgba(15,15,30,0.65));
  backdrop-filter: blur(32px) saturate(1.3);
  -webkit-backdrop-filter: blur(32px) saturate(1.3);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
  text-decoration: none;
  color: var(--text);
  transition: all 0.3s ease;
  cursor: pointer;
  position: relative;
  overflow: hidden;
}

.link-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: var(--radius);
  background: linear-gradient(135deg, rgba(102,126,234,0.08), rgba(118,75,162,0.04));
  opacity: 0;
  transition: opacity 0.3s ease;
}

.link-card:hover {
  transform: translateY(-2px);
  border-color: var(--border-hover);
  box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 30px rgba(102,126,234,0.12), inset 0 1px 0 rgba(255,255,255,0.12);
}
.link-card:hover::before {
  opacity: 1;
}
.link-card:active {
  transform: translateY(0);
}

.link-icon {
  position: relative;
  z-index: 1;
  width: 44px;
  height: 44px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.06);
}

.link-icon img {
  width: 28px;
  height: 28px;
  object-fit: contain;
}

.link-icon svg {
  width: 24px;
  height: 24px;
  fill: currentColor;
}

.link-card--logo {
  justify-content: center;
  padding: 20px 24px;
}

.link-logo {
  height: 32px;
  width: auto;
  object-fit: contain;
  filter: brightness(1);
  transition: filter 0.3s ease;
}
.link-card--logo:hover .link-logo {
  filter: brightness(1.15);
}

.link-icon--gradient {
  background: linear-gradient(135deg, rgba(102,126,234,0.2), rgba(118,75,162,0.2));
  border-color: rgba(102,126,234,0.15);
}

.link-icon--vpn {
  background: linear-gradient(135deg, rgba(56,239,125,0.15), rgba(17,153,142,0.15));
  border-color: rgba(56,239,125,0.1);
}

.link-icon--catalyst {
  background: linear-gradient(135deg, rgba(240,147,251,0.15), rgba(245,87,108,0.15));
  border-color: rgba(240,147,251,0.1);
}

.link-icon--x402 {
  background: linear-gradient(135deg, rgba(79,172,254,0.15), rgba(0,242,254,0.15));
  border-color: rgba(79,172,254,0.1);
}

.link-icon--x {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.08);
}

.link-icon--github {
  background: rgba(255,255,255,0.08);
  border-color: rgba(255,255,255,0.08);
}

.link-text {
  position: relative;
  z-index: 1;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.link-title {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.01em;
}

.link-desc {
  font-size: 12px;
  color: var(--text-muted);
  font-weight: 400;
  letter-spacing: 0.01em;
}

.link-arrow {
  position: relative;
  z-index: 1;
  color: var(--text-muted);
  font-size: 16px;
  transition: transform 0.3s ease, color 0.3s ease;
  flex-shrink: 0;
}
.link-card:hover .link-arrow {
  transform: translateX(3px);
  color: var(--text-secondary);
}

/* ── Social Row ── */
.socials {
  display: flex;
  gap: 12px;
  margin-top: 4px;
}

.social-btn {
  width: 48px;
  height: 48px;
  border-radius: 14px;
  background: linear-gradient(135deg, rgba(10,10,20,0.7), rgba(15,15,30,0.6));
  backdrop-filter: blur(28px) saturate(1.2);
  -webkit-backdrop-filter: blur(28px) saturate(1.2);
  border: 1px solid rgba(255,255,255,0.1);
  box-shadow: 0 4px 16px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  text-decoration: none;
  transition: all 0.3s ease;
}
.social-btn svg {
  width: 20px;
  height: 20px;
  fill: currentColor;
}
.social-btn:hover {
  transform: translateY(-2px);
  border-color: var(--border-hover);
  color: var(--text);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.08);
}

/* ── Footer ── */
.footer {
  font-size: 11px;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
  font-weight: 300;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0.6;
}
.footer a {
  color: inherit;
  text-decoration: none;
  transition: color 0.3s ease;
}
.footer a:hover {
  color: var(--text-secondary);
}

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.container > * {
  animation: fadeUp 0.6s ease-out both;
}
.container > :nth-child(1) { animation-delay: 0.05s; }
.container > :nth-child(2) { animation-delay: 0.1s; }
.container > :nth-child(3) { animation-delay: 0.15s; }
.container > :nth-child(4) { animation-delay: 0.2s; }

.links .link-card {
  animation: fadeUp 0.5s ease-out both;
}
.links .link-card:nth-child(1) { animation-delay: 0.15s; }
.links .link-card:nth-child(2) { animation-delay: 0.22s; }
.links .link-card:nth-child(3) { animation-delay: 0.29s; }
.links .link-card:nth-child(4) { animation-delay: 0.36s; }
.links .link-card:nth-child(5) { animation-delay: 0.43s; }
.links .link-card:nth-child(6) { animation-delay: 0.50s; }

/* ── Responsive ── */
@media (max-width: 480px) {
  .container { padding: 40px 16px 32px 20px; gap: 24px; }
  .link-card { padding: 14px 16px; gap: 12px; }
  .link-icon { width: 32px; height: 32px; border-radius: 8px; }
  .link-icon img { width: 18px; height: 18px; }
  .link-icon svg { width: 17px; height: 17px; }
  .link-title { font-size: 14px; }
  .link-desc { font-size: 11px; }
}
</style>
</head>
